name: .NET CI

on:
  push:
    branches:
      - main
      - feature/inventory-testing
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Run unit tests
      run: dotnet test G3VehicleInventory.UnitTests/G3VehicleInventory.UnitTests.csproj --no-build

    - name: Run integration tests
      run: dotnet test G3VehicleInventory.IntegrationTests/G3VehicleInventory.IntegrationTests.csproj --no-build