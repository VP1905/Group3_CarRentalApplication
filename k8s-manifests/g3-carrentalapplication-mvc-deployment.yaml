apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert --out k8s-manifests
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: g3-carrentalapplication-mvc
  name: g3-carrentalapplication-mvc
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: g3-carrentalapplication-mvc
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert --out k8s-manifests
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: g3-carrentalapplication-mvc
    spec:
      containers:
        - env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ApiSettings__ApiKey
              value: GR3SecretKey123
            - name: ApiSettings__GatewayBaseUrl
              value: http://g3_carrentalapplication.gateway:8080/
          image: g3carrentalapplicationmvc
          name: g3-mvc
          ports:
            - containerPort: 8080
              protocol: TCP
      restartPolicy: Always
